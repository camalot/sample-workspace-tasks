stages:
  - .pre
  - build
  - test
  - deploy
  - .post
npm-install:
  gclDescription: Install npm packages
  stage: build
  image:
    name: node:16.10.0-alpine3.14
  needs: []
  cache:
    - key: npm-cache
      paths:
        - .npm
      policy: pull-push
      when: on_success
    - key:
        files:
          - package-lock.json
      paths:
        - node_modules
      policy: pull-push
      when: on_success
  artifacts:
    paths:
      - node_modules/
  script:
    - npm install --no-audit --no-progress --cache .npm
npm-outdated:
  gclDescription: Find outdated packages in node_modules
  stage: test
  image:
    name: node:16.10.0-alpine3.14
  allow_failure: true
  needs:
    - job: npm-install
      artifacts: true
      optional: false
  script:
    - npx -s ncu -e2 --deprecated --packageFile package.json
docker-compose-up:
  gclDescription: Up docker-compose services
  stage: deploy
  needs:
    - job: npm-install
      artifacts: true
      optional: false
  environment:
    url: http://localhost:8891
    name: local
  script:
    - docker compose up -d
docker-compose-down:
  gclDescription: Down docker-compose services
  stage: .post
  rules:
    - if: $GITLAB_CI == 'false'
      when: manual
  environment:
    name: local
  script:
    - docker compose down
always-cleanup:
  gclDescription: Clean up resources regardless of pipeline result
  stage: .post
  when: always
  allow_failure: true
  script:
    - docker compose down --volumes --remove-orphans || true
notify-failure:
  gclDescription: Notify team when pipeline fails
  stage: .post
  when: on_failure
  allow_failure: true
  script:
    - echo "Pipeline failed — notify team here"
skip-me:
  stage: build
  rules:
    - when: never
  script:
    - echo "This job should never run"
default: {}
